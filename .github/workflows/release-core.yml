name: Release Core

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. core-v0.1.0"
        required: true
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  release-core:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore solution
        run: nuget restore CastleForge.sln

      - name: Build solution (Release)
        run: msbuild CastleForge.sln /m /p:Configuration=Release /p:Platform=x86

      - name: Package core release
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"

          New-Item -ItemType Directory -Force -Path release | Out-Null
          New-Item -ItemType Directory -Force -Path pkg\ModLoader | Out-Null
          New-Item -ItemType Directory -Force -Path pkg\ModLoaderExtensions | Out-Null

          # ModLoader package
          Copy-Item "Build\Release\ModLoader.dll" "pkg\ModLoader\" -Force
          Copy-Item "Build\Release\CastleMinerZ.exe.config" "pkg\ModLoader\" -Force
          Copy-Item "Build\Release\Update&Launch.bat" "pkg\ModLoader\" -Force

          # if (Test-Path "CastleForge\ModLoaderFramework\ModLoader\README.md") {
          #   Copy-Item "CastleForge\ModLoaderFramework\ModLoader\README.md" "pkg\ModLoader\" -Force
          # }
          # if (Test-Path "LICENSE") {
          #   Copy-Item "LICENSE" "pkg\ModLoader\" -Force
          # }

          # ModLoaderExtensions package
          Copy-Item "Build\Release\!Mods\ModLoaderExtensions.dll" "pkg\ModLoaderExtensions\" -Force

          # if (Test-Path "CastleForge\ModLoaderFramework\ModLoaderExtensions\README.md") {
          #   Copy-Item "CastleForge\ModLoaderFramework\ModLoaderExtensions\README.md" "pkg\ModLoaderExtensions\" -Force
          # }
          # if (Test-Path "LICENSE") {
          #   Copy-Item "LICENSE" "pkg\ModLoaderExtensions\" -Force
          # }

          Compress-Archive -Path "pkg\ModLoader\*" -DestinationPath "release\CastleForge-ModLoader-$version.zip" -Force
          Compress-Archive -Path "pkg\ModLoaderExtensions\*" -DestinationPath "release\CastleForge-ModLoaderExtensions-$version.zip" -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: release/*.zip