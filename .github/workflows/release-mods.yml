name: Release Mods

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. mods-v0.1.0"
        required: true
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  release-mods:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore solution
        run: nuget restore CastleForge.sln

      - name: Build solution (Release)
        run: msbuild CastleForge.sln /m /p:Configuration=Release /p:Platform=x86

      - name: Package official mods individually
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $modsRoot = "Build\Release\!Mods"

          New-Item -ItemType Directory -Force -Path release | Out-Null
          New-Item -ItemType Directory -Force -Path pkg | Out-Null

          Get-ChildItem -Path $modsRoot -Filter *.dll | ForEach-Object {
            $modDll = $_
            $modName = [System.IO.Path]::GetFileNameWithoutExtension($modDll.Name)

            # Skip ModLoaderExtensions from the mods release
            if ($modName -eq "ModLoaderExtensions") { return }

            $pkgDir = Join-Path "pkg" $modName
            New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null

            # Main mod DLL
            Copy-Item $modDll.FullName $pkgDir -Force

            # Optional support folder with same name
            $supportDir = Join-Path $modsRoot $modName
            if (Test-Path $supportDir) {
              Copy-Item $supportDir (Join-Path $pkgDir $modName) -Recurse -Force
            }

            # Optional README from source tree
            $readmePath = Join-Path "CastleForge\Mods\$modName" "README.md"
            if (Test-Path $readmePath) {
              Copy-Item $readmePath $pkgDir -Force
            }

            # Optional LICENSE
            if (Test-Path "LICENSE") {
              Copy-Item "LICENSE" $pkgDir -Force
            }

            Compress-Archive -Path (Join-Path $pkgDir '*') -DestinationPath "release\$modName-$version.zip" -Force
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: release/*.zip