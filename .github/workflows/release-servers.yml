name: Release Servers

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. servers-v0.1.0"
        required: true
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  release-servers:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore solution
        run: nuget restore CastleForge.sln

      - name: Build solution (Release)
        run: msbuild CastleForge.sln /m /p:Configuration=Release /p:Platform=x86

      - name: Package dedicated servers individually
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $servers = @(
            "CMZDedicatedLidgrenServer",
            "CMZDedicatedSteamServer"
          )

          New-Item -ItemType Directory -Force -Path "pkg" | Out-Null
          New-Item -ItemType Directory -Force -Path "release" | Out-Null

          foreach ($serverName in $servers) {
            $serverRoot = Join-Path "Build\Release\!Mods" $serverName

            if (-not (Test-Path $serverRoot)) {
              throw "Expected server output folder was not found: $serverRoot"
            }

            $pkgDir = Join-Path "pkg" $serverName
            if (Test-Path $pkgDir) {
              Remove-Item $pkgDir -Recurse -Force
            }

            New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
            Copy-Item (Join-Path $serverRoot '*') $pkgDir -Recurse -Force

            Compress-Archive -Path (Join-Path $pkgDir '*') -DestinationPath "release\$serverName-$version.zip" -Force
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: release/*.zip
