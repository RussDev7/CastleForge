# ==================================================
# Server identity / network compatibility
# ==================================================

# Display name shown to players in the Steam browser / session info.
server-name=CMZ Steam Server

# Expected CastleMiner Z network game name.
# Clients must match this to connect successfully.
game-name=CastleMinerZSteam

# Expected protocol / network version.
# Clients using a different version may be rejected.
network-version=4


# ==================================================
# Server bind / player limits
# ==================================================

# Local IP address used by the dedicated host.
# Keep 0.0.0.0 unless you specifically want to bind to one interface.
server-ip=0.0.0.0

# Port used by the dedicated host for local/server-side networking behavior.
server-port=61903

# Maximum number of connected players allowed at once.
max-players=8

# Optional session password.
# Leave blank for no password.
password=


# ==================================================
# Game files
# ==================================================

# Path to the CastleMiner Z Steam game folder that contains CastleMinerZ.exe,
# DNA.Common.dll, DNA.Steam.dll, and steam_api.dll.
# Can be absolute or relative.
game-path=C:\Program Files (x86)\Steam\steamapps\common\CastleMiner Z


# ==================================================
# Steam runtime / hosting behavior
# ==================================================

# Steam App ID for CastleMiner Z.
steam-app-id=253430

# Whether the hosted Steam lobby should be visible in the online browser.
steam-lobby-visible=true

# Whether the server should allow reduced/minimal Steam update behavior.
# Recommended to leave false unless you know you need it.
steam-allow-minimal-updates=false

# Indicates that this transport expects a real logged-in Steam account.
steam-account-required=true

# Whether the lobby should be limited to friends-only visibility.
steam-friends-only=false

# Writes steam_appid.txt beside the server EXE when starting.
write-steam-appid-file=true

# Indicates that Steam must already be running under the same Windows user context
# as this dedicated server process.
require-running-steam-client=true


# ==================================================
# Save / world identity
# ==================================================

# Steam ID used as the save-owner identity for the server's save-device / storage access.
# Use 0 to let the server use the currently logged-in Steam account automatically.
save-owner-steam-id=76561198296842857

# GUID of the world folder the server should load.
# The server will look for this under Worlds\{world-guid}.
world-guid=b8c81243-b6ac-48fe-a782-1e2dc5a44d17


# ==================================================
# Host view / update loop
# ==================================================

# Chunk view distance used by the host for chunk-related behavior.
view-distance-chunks=8

# Main server update loop rate in Hz.
# Higher values can improve responsiveness but use more CPU.
tick-rate-hz=60


# ==================================================
# Session gameplay values
# ==================================================

# Session game mode value.
# Uses the game's internal numeric mode values.
# 0 = Endurance,
# 1 = Survival,
# 2 = DragonEndurance,
# 3 = Creative,
# 4 = Exploration,
# 5 = Scavenger
game-mode=1

# Session PVP state value.
# Uses the game's internal numeric PVP values.
# 0 = Off,
# 1 = Everyone,
# 2 = NotFriends
pvp-state=0

# Session difficulty value.
# Uses the game's internal numeric difficulty values.
# 0 = EASY,
# 1 = HARD,
# 2 = NOENEMIES,
# 3 = HARDCORE
difficulty=1

# Whether the session uses infinite resources.
# false = normal survival-style behavior
# true  = infinite resources enabled
infinite-resource-mode=false


# ==================================================
# Optional behavior toggles
# ==================================================

# Allows clients to send TimeOfDayMessage values that update the server's authoritative day/time.
# Recommended to leave false unless you intentionally want clients to control time.
allow-client-time-sync=false